# Release workflow (issue #83, smoke-tested via #102).
#
# Triggered by semver tags (v*) or manually via workflow_dispatch.
# Produces:
#   - Cross-compiled binaries (linux/amd64, linux/arm64, darwin/arm64)
#   - SHA256 checksums file
#   - GitHub Release with all artifacts attached
#   - Multi-arch (amd64 + arm64) GHCR image
#   - SBOM (SPDX JSON) attached to the release
#   - Keyless cosign signature on the image (requires OIDC permissions)
#
# workflow_dispatch lets operators smoke-test the full pipeline from the
# Actions UI without cutting a real release tag. When dispatched manually,
# the resulting GitHub Release is marked as a prerelease by default so it
# doesn't appear as "latest".
#
# Kept separate from ci.yml per the issue's implementation notes.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for artifacts (e.g. v0.0.0-smoke.1)'
        required: true
        default: 'v0.0.0-smoke.1'
      prerelease:
        description: 'Mark the GitHub Release as a prerelease (recommended for smoke tests)'
        type: boolean
        default: true
      draft:
        description: 'Create the GitHub Release as a draft instead of publishing'
        type: boolean
        default: false

permissions:
  contents: write      # create GitHub Release + upload assets
  packages: write      # push to GHCR
  id-token: write      # cosign keyless signing (OIDC)
  attestations: write  # artifact attestations

env:
  GO_VERSION: '1.26'

jobs:
  # ── Cross-compile binaries + checksums ──────────────────────────
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Determine version
        id: ver
        # inputs.version is set on workflow_dispatch; empty (falsy) on
        # tag push, so we fall through to GITHUB_REF_NAME (the tag).
        run: echo "version=${{ inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # Targets: OS/ARCH -> output filename
          build_one() {
            local goos="$1" goarch="$2" name="$3"
            echo "::group::Building ${goos}/${goarch}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="${LDFLAGS}" \
              -o "dist/${name}" ./cmd/nexus
            echo "::endgroup::"
          }

          build_one linux   amd64 "nexus-${VERSION}-linux-amd64"
          build_one linux   arm64 "nexus-${VERSION}-linux-arm64"
          build_one darwin  arm64 "nexus-${VERSION}-darwin-arm64"

      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          sha256sum nexus-* > checksums-sha256.txt
          echo "Checksums:"
          cat checksums-sha256.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: dist/
          retention-days: 7

  # ── Build & publish multi-arch GHCR image + cosign signature ────
  docker:
    name: GHCR image + signature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=$(echo "${VERSION}" | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.version_no_v }}
            type=raw,value=latest

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
        # NOTE: Do NOT set `outputs: push-by-digest` here — it silently
        # overrides `tags`/`push`, leaving the image untagged. The
        # `digest` output is populated regardless and used for cosign
        # signing below.

      # ── Keyless cosign signing (requires id-token: write) ───────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          IMAGE: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: |
          echo "Signing: ${IMAGE}"
          cosign sign --yes "${IMAGE}"

      - name: Verify signature
        env:
          IMAGE: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: |
          # The OIDC certificate identity differs between tag-push
          # (refs/tags/<tag>) and workflow_dispatch (refs/heads/<branch>).
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            REF="refs/heads/${GITHUB_REF_NAME}"
          else
            REF="refs/tags/${GITHUB_REF_NAME}"
          fi
          IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${REF}"
          echo "Verifying: ${IMAGE}"
          echo "Identity:  ${IDENTITY}"
          cosign verify "${IMAGE}" \
            --certificate-identity "${IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

  # ── SBOM generation ─────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Determine version
        id: ver
        run: echo "version=${{ inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # NOTE: artifact-name must NOT contain dots — actions/upload-
      # artifact@v4 rejects them. Use a simple name and rename the
      # file before attaching to the release.
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: nexus-sbom
          upload-artifact: true
          upload-release-assets: false

      - name: Stage SBOM with version filename
        uses: actions/download-artifact@v4
        with:
          name: nexus-sbom
          path: dist/

      - name: Rename SBOM for release upload
        run: |
          cd dist
          FILE=$(ls -1 | head -1)
          mv "${FILE}" "nexus-${{ steps.ver.outputs.version }}-sbom.spdx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: dist/*.spdx.json
          retention-days: 7

  # ── Create GitHub Release with all artifacts ────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, sbom]
    steps:
      - name: Determine version
        id: ver
        run: echo "version=${{ inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease == true }}
          draft: ${{ inputs.draft == true }}
          files: |
            dist/nexus-*
            dist/checksums-sha256.txt
            dist/*.spdx.json
          body: |
            ## Artifacts

            | File | Description |
            |------|-------------|
            | `nexus-*-linux-amd64` | Linux x86_64 binary |
            | `nexus-*-linux-arm64` | Linux ARM64 binary |
            | `nexus-*-darwin-arm64` | macOS Apple Silicon binary |
            | `checksums-sha256.txt` | SHA256 checksums for all binaries |
            | `*-sbom.spdx.json` | SPDX SBOM |

            ## Verify

            ```bash
            sha256sum -c checksums-sha256.txt
            ```

            ## Docker image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            docker run --rm ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }} --version
            ```

            ## Verify image signature

            ```bash
            cosign verify ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }} \
              --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ steps.ver.outputs.version }}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
            ```
