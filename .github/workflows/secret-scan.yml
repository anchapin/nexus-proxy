# Secret scanning with gitleaks (issue #124).
#
# Scans every pull request for accidentally committed secrets (API keys,
# bearer tokens, private keys). The proxy handles frontier API keys,
# inbound bearer tokens, and TLS material — all read from env vars at
# runtime, so a real key should never appear in the repo. This job is
# the safety net for when it does.
#
# `.github/gitleaks.toml` extends the default rule set and allowlists
# `.env.example` (placeholders only). The real `.env` is gitignored.
#
# Triggers on pull_request so secrets are caught before merge. Also runs
# on push to main as a backstop.

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .github/gitleaks.toml
