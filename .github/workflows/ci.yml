name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: vet, build, test
    runs-on: ubuntu-latest
    env:
      # Coverage floor (issue #124). Conservative bar set below the
      # current ~75% so the gate catches gross regressions without
      # churning existing PRs. Raise as coverage improves.
      COVERAGE_THRESHOLD: "70"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./cmd/nexus

      - name: go test (with race detector)
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          retention-days: 7

      # ── Coverage gate (issue #124) ───────────────────────────────
      # Fails the job if total coverage drops below COVERAGE_THRESHOLD.
      # The bar is deliberately conservative (see env above) so the
      # gate activates without blocking existing PRs. Per-package
      # numbers are printed for visibility but only the total gates.
      - name: Coverage gate
        run: |
          set -euo pipefail
          # Summarise per-package coverage for log visibility.
          echo "::group::Per-package coverage"
          go tool cover -func=coverage.txt | awk -F'\t+' '
            /^total:/ { next }
            { pkg[$1] += ($3+0); cnt[$1]++ }
            END {
              for (p in pkg) printf "%-50s %s\n", p, "(see func report above)"
            }
          ' || true
          echo "::endgroup::"
          # Extract the total percentage (last line of `cover -func`).
          TOTAL=$(go tool cover -func=coverage.txt | awk '/^total:/ { gsub("%","",$NF); print $NF }')
          echo "Total coverage: ${TOTAL}%"
          echo "Threshold:      ${COVERAGE_THRESHOLD}%"
          # awk handles float comparison (bash arithmetic is integer-only).
          awk -v t="${TOTAL}" -v c="${COVERAGE_THRESHOLD}" \
            'BEGIN { if (t+0 < c+0) {
                       printf "::error::Coverage %.1f%% is below the %.0f%% gate (COVERAGE_THRESHOLD).\n", t, c
                       exit 1
                     }
                     printf "::notice::Coverage %.1f%% meets the %.0f%% gate.\n", t, c
                   }'

  bench:
    # Non-blocking benchmark smoke run (issue #36). Uses -benchtime=100ms
    # via `make bench-short` so the whole suite stays under 30 s. Compare
    # the uploaded bench.txt against docs/BENCHMARKS.md for drift.
    name: bench (smoke)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download modules
        run: go mod download

      - name: make bench-short
        run: make bench-short | tee bench.txt

      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench
          path: bench.txt
          retention-days: 7

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # golangci-lint v2.12.2 supports Go 1.25+ and replaces the old v1.x
      # series. The old comment about Go 1.24 is retained for context but
      # the lint job now uses the same Go 1.26 toolchain as the rest of CI.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m
