name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: vet, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./cmd/nexus

      - name: go test (with race detector)
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          retention-days: 7

  bench:
    # Non-blocking benchmark smoke run (issue #36). Uses -benchtime=100ms
    # via `make bench-short` so the whole suite stays under 30 s. Compare
    # the uploaded bench.txt against docs/BENCHMARKS.md for drift.
    name: bench (smoke)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download modules
        run: go mod download

      - name: make bench-short
        run: make bench-short | tee bench.txt

      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench
          path: bench.txt
          retention-days: 7

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin Go to 1.24 for the lint job only. golangci-lint v1.64.8 is
      # built with Go 1.24; running it under Go 1.26 causes stdlib
      # vendor files (fips140only_go1.26.go) to fail typecheck, which
      # cascades into false "undefined" errors on promoted fields from
      # embedded *httptest.Server in test files (#69, #129).
      # Test/build/bench jobs stay on 1.26 — only the lint job is pinned.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m
