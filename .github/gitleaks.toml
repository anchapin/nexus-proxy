# Gitleaks configuration for nexus-proxy (issue #124).
#
# Extends the built-in default rule set, then allowlists files that
# contain only placeholder/example values. The real `.env` is gitignored
# (line 21 of .gitignore); `.env.example` holds empty or dummy values
# only and is allowlisted here so it never produces a false positive.

[extend]
useDefault = true

[[allowlists]]
description = "Example env file and provider constructors — no real secrets"
paths = [
  ".env.example",
  "internal/providers/",
]

# False positive: float64 parameter types in function signatures flagged as generic-api-key.
# These are not secrets — just type declarations. (issue #313)
[[allowlists]]
description = "float64 parameter types falsely flagged as generic-api-key"
paths = [
  "internal/handlers/chat.go",
]

# False positive: test files that set environment variables with fake/redacted values.
[[allowlists]]
description = "Test files setting fake env var values — not real secrets"
paths = [
  "internal/config/file_integration_test.go",
]
