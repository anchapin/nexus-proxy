# docker-compose.yml — run Nexus Proxy with a local Ollama backend.
#
# Usage:
#   NEXUS_FRONTIER_API_KEY=sk-... docker compose up -d
#   # or put it in a host-side .env (Compose reads it automatically)
#   curl http://localhost:8000/healthz   # → "ok"
#
# The first `up` will pull the Ollama models in a second pass. Run
# `docker compose exec ollama ollama pull qwen3-coder:4b qwen3-coder:8b
# nomic-embed-text` from the host once the Ollama container is healthy.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    # GPU passthrough for hosts with NVIDIA drivers. Comment out on
    # CPU-only / macOS / WSL2 setups; Ollama falls back to CPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      # Exposed on the host so the operator can `curl http://localhost:11434`
      # for debugging. The proxy talks to ollama over the compose network
      # using the service name "ollama", not localhost.
      - "11434:11434"
    volumes:
      # Persist downloaded models across container restarts. Without
      # this every `up` would re-download the multi-GB qwen3-coder weights.
      - ollama-data:/root/.ollama
    healthcheck:
      # The official ollama image ships with curl.
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 3s
      retries: 10
      # Models can take a while to be ready after a cold start.
      start_period: 30s
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-proxy
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # Listen address inside the container network. Override on the
      # host with `ports:` below to change the external mapping.
      NEXUS_ADDR: ":8000"
      # Talk to the ollama service over the compose network — never
      # localhost here, that would resolve to the proxy's own loopback.
      NEXUS_OLLAMA_URL: "http://ollama:11434"
      # Frontier key is supplied by the host environment. Leaving it
      # empty is fine for fully-local routing; frontier-bound requests
      # will 401 until the operator sets it.
      NEXUS_FRONTIER_API_KEY: "${NEXUS_FRONTIER_API_KEY:-}"
      # Inbound auth gate (issue #37). When set on the host, the proxy
      # requires `Authorization: Bearer <key>` or `X-API-Key` on
      # /v1/chat/completions. Leave unset for an unauthenticated local
      # dev compose stack. /healthz stays exempt for healthchecks.
      NEXUS_PROXY_API_KEY: "${NEXUS_PROXY_API_KEY:-}"
      # The default path (./nexus-telemetry.jsonl) resolves to the
      # container's WORKDIR (/tmp), which is fine — pinning it here
      # makes the contract explicit and survives a future WORKDIR move.
      NEXUS_TELEMETRY_PATH: "/tmp/nexus-telemetry.jsonl"
      # TLS termination (issue #39). When both cert and key paths are
      # set, the proxy serves HTTPS instead of plain HTTP. Mount the
      # cert/key into the container via the volumes below and supply
      # the in-container paths here. Leave both unset for plaintext.
      NEXUS_TLS_CERT: "${NEXUS_TLS_CERT:-}"
      NEXUS_TLS_KEY: "${NEXUS_TLS_KEY:-}"
      # When true alongside TLS active, start a :80 → HTTPS 301 redirect.
      NEXUS_TLS_REDIRECT: "${NEXUS_TLS_REDIRECT:-false}"
      # Kubernetes-style readiness (issue #42). "degraded" always
      # returns 200 so a transient Ollama outage does not trigger a
      # compose `unhealthy` event; flip to "strict" when the operator
      # wants the container removed from the rotation when neither
      # Ollama nor the frontier is reachable.
      NEXUS_READINESS_MODE: "${NEXUS_READINESS_MODE:-degraded}"
    ports:
      - "8000:8000"
      # When TLS is enabled, map 443 too (and 80 for the redirect if
      # NEXUS_TLS_REDIRECT=true). Uncomment as needed.
      # - "443:8443"
      # - "80:80"
    healthcheck:
      # /readyz returns 200 when the proxy can serve traffic (or
      # always in degraded mode) and 503 only when neither Ollama nor
      # the frontier can serve (strict mode). Mirrors the K8s
      # readinessProbe contract so a future k8s deployment can lift
      # this block verbatim (issue #42 AC).
      #
      # The current Dockerfile uses gcr.io/distroless/static-debian12,
      # which ships neither wget nor curl. Compose v2 will mark the
      # service `unhealthy` whenever this test exits non-zero — so
      # this block will only produce green healthchecks after either:
      #   (a) the runtime image is switched to one with a busybox /
      #       wget layer, or
      #   (b) a sidecar / external checker is used (the same role
      #       k8s readinessProbe plays in production).
      # The block is still documented here so the contract is
      # machine-readable and a future image update gets the
      # healthcheck for free without a compose rewrite. The
      # Dockerfile's `HEALTHCHECK NONE` is the canonical in-image
      # stance until (a) or (b) lands.
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      # Give the boot-time RAG index + health probe a moment to
      # settle before the first probe; otherwise the very first poll
      # can race the boot RAG timeout and produce a spurious
      # "unhealthy" event.
      start_period: 15s
    volumes:
      # Read-only mount for TLS cert/key (issue #39). The host paths are
      # supplied via NEXUS_TLS_CERT / NEXUS_TLS_KEY on the host; mount a
      # directory so a cert rotation only needs a file swap, not a
      # compose restart. Adjust the host side to your cert location
      # (e.g. /etc/letsencrypt/live/<domain>).
      - "${NEXUS_TLS_DIR:-./certs}:/etc/nexus/tls:ro"
    restart: unless-stopped

volumes:
  ollama-data:
