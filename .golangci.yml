# Nexus Proxy lint configuration.
#
# Conservative starter set: catches bugs and obvious smells without fighting
# formatter choices. Tighten or loosen per project taste over time.

run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    # Bug catchers
    - bodyclose      # missing resp.Body.Close() after http.Client.Do
    - depguard       # dependency allow-list enforcement
    - errcheck       # unchecked errors
    - errorlint      # %w wrapping, errors.Is/As instead of ==
    - gosimple       # simplifications
    - govet          # stdlib vet
    - ineffassign    # unused assignments
    - noctx          # http.NewRequest w/o context propagation
    - sqlclosecheck  # missing rows.Close()/stmt.Close()
    - staticcheck    # broad static analysis
    - unused         # unused identifiers

    # Style / hygiene
    - gocritic       # opinionated style + bug patterns
    - gofmt          # canonical formatting
    - goimports      # import grouping
    - misspell       # typos in comments/strings
    - revive         # golint replacement

linters-settings:
  depguard:
    rules:
      main:
        allow:
          - $gostd
          - modernc.org/sqlite
          - github.com/anchapin/nexus-proxy
        deny:
          - pkg: default
            desc: "Only stdlib, modernc.org/sqlite, and internal packages are allowed"
  revive:
    rules:
      - name: package-comments
        disabled: true # only cmd/ entry points skip package doc comments

issues:
  exclude-rules:
    # cmd/ packages are tiny wiring shims; no package doc comment needed.
    # Scoped narrowly so internal/ packages keep the lint signal.
    - path: ^cmd/
      linters:
        - revive

    # Tests commonly use package-level helpers and short identifiers.
    # Note: bodyclose and sqlclosecheck are intentionally NOT exempted
    # here — they catch real leaks in test helpers too.
    - path: _test\.go
      linters:
        - errcheck
        - revive

  # Don't fail on TODO comments in early-stage code; revisit later.
  exclude: ['TODO\(']