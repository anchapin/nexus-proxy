# Nexus Proxy lint configuration.
#
# Conservative starter set: catches bugs and obvious smells without fighting
# formatter choices. Tighten or loosen per project taste over time.

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # Bug catchers
    - errcheck       # unchecked errors
    - govet          # stdlib vet
    - ineffassign    # unused assignments
    - staticcheck    # gosimple merged here in v2; broad static analysis
    - unused         # unused identifiers

    # Style / hygiene
    - revive         # golint replacement

  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true # cmd/ packages don't need doc comments

  exclusions:
    rules:
      # Tests commonly use package-level helpers and short identifiers.
      - path: _test\.go
        linters:
          - errcheck
          - revive

      # Don't fail on TODO comments in early-stage code; revisit later.
      - path: (.+)\.go$
        text: TODO\(

      # cmd/ helpers write to io.Writer in "fire-and-forget" style;
      # ignoring write errors is the intentional design (same as v1).
      - path: cmd/
        linters:
          - errcheck
        text: fmt\.F(print|printf|println)

      # resp.Body.Close and rows.Close ignored in non-critical paths
      # (matches v1 behaviour which excluded these via less-granular rules).
      - path: (.+)\.go$
        linters:
          - errcheck
        text: resp\.Body\.Close|rows\.Close|stmt\.Close

formatters:
  enable:
    - goimports      # import grouping
    - gofmt          # canonical formatting
